{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบฟอร์ม</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">TNT shop</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">หน้าแรก</a></li>
        <li class="nav-item"><a class="nav-link active" href="{% url 'form' %}">แบบฟอร์ม</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">เกี่ยวกับ</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero d-flex align-items-center text-white text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">ติดต่อเรา 📩</h1>
        <p class="lead">สอบถามข้อมูลสินค้าได้เลย</p>
    </div>
</section>

<!-- Form -->
<div class="container mt-5">
    <h2 class="text-center mb-4">แบบฟอร์มติดต่อ</h2>

    <form method="POST" class="w-50 mx-auto">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">ชื่อ</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">อีเมล</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">ข้อความ</label>
            <textarea name="message" class="form-control" required></textarea>
        </div>

        <button class="btn btn-dark w-100">ส่ง</button>
    </form>

    <!-- แจ้งผล -->
    {% if success %}
        <div class="alert alert-success mt-3 text-center">
            ส่งข้อมูลเรียบร้อยแล้ว ✅
        </div>
    {% endif %}
</div>

<footer class="footer text-center text-white mt-5 p-4">
    <div class="mb-3">
        <a href="#" class="text-white me-3">Facebook</a>
        <a href="#" class="text-white me-3">Instagram</a>
        <a href="#" class="text-white">Line</a>
    </div>
    <p class="mb-0">© 2026 Thanatorn Namkon 68116523.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
